<div class="rst-versions" data-toggle="rst-versions" role="note" aria-label="versions">

  <span class="rst-current-version" data-toggle="rst-current-version" onclick="loadVersionsAndLanguages()">
    Version: {{ current_version }} ({{ current_language }})
    <span class="fa fa-caret-down"></span>
  </span>
  <div class="rst-other-versions">
    <dl id="languages">
    </dl>
    <dl id="versions">
    </dl>
    <br>
    </dl>
    <div id="error" class="wy-text-danger">      
    </div>
    <script>
      function setContent(data) {
        const languages = $("#languages");
        languages.text("");
        languages.append("<dt>Languages</dt>");
        for (const lang of data.languages) {
          languages.append(`<dd><a href=\"${lang.url}\">${lang.language}</a></dd>`);
        }
        const versions = $("#versions");
        versions.text("");
        versions.append("<dt>Versions</dt>");
        for (const version of data.versions) {
          versions.append(`<dd><a href=\"${version.url}\">${version.version}</a></dd>`);
        }
      }
      
      function loadVersionsAndLanguages() {
        const languages = $("#languages");
        if (languages.children().length > 0) {
          return;
        }
        languages.text("Loading ...");
        $.ajax({ 
          type: "GET",
          dataType: "json",
          timeout: 60000,
          url: "/api/availableDocs/{{ current_project }}/{{ current_version}}/{{ current_language }}",
          success: function(data) {
            setContent(data);       
          },
          error: function(xhr, ajaxOptions, thrownError) {
            setContent({
              "languages": [{
                  "language": "{{ current_language }}",
                  "url": "#" }],
              "versions": [{
                  "version": "{{ current_language }}",
                  "url": "#"
                }] });
            $("#error").text("Cannot load version and language information: " + thrownError);
          }
        });
      }
    </script>
  </div>
</div>
